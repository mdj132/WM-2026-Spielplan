const canTip=(d,t)=>Date.now()<new Date(d+"T"+t+":00").getTime()-5*60*1000;
const isStarted=(d,t)=>Date.now()>=new Date(d+"T"+t+":00").getTime();
const fmtDate=d=>new Date(d).toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"2-digit"});

function calcPoints(tip,res){
  if(!tip||!res)return 0;
  const tH=tip.home,tA=tip.away,rH=res.home,rA=res.away;
  if(tH===rH&&tA===rA)return 5;
  const tD=tH-tA,rD=rH-rA;
  if(!((tD>0&&rD>0)||(tD<0&&rD<0)||(tD===0&&rD===0)))return 0;
  return tD===rD?3:2;
}
function calcTable(grp,results){
  const s=Object.fromEntries(GROUP_TEAMS[grp].map(t=>[t,{sp:0,g:0,u:0,v:0,tf:0,ta:0,pts:0}]));
  GAMES.filter(x=>x.g===grp).forEach(x=>{
    const r=results[x.id];if(!r)return;
    s[x.home].sp++;s[x.away].sp++;
    s[x.home].tf+=r.home;s[x.home].ta+=r.away;
    s[x.away].tf+=r.away;s[x.away].ta+=r.home;
    if(r.home>r.away){s[x.home].g++;s[x.home].pts+=3;s[x.away].v++;}
    else if(r.home<r.away){s[x.away].g++;s[x.away].pts+=3;s[x.home].v++;}
    else{s[x.home].u++;s[x.away].u++;s[x.home].pts++;s[x.away].pts++;}
  });
  return Object.entries(s).map(([n,v])=>({n,...v,td:v.tf-v.ta})).sort((a,b)=>b.pts-a.pts||b.td-a.td||b.tf-a.tf);
}

  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(15,39,68,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:16}}>
      <div onClick={function(e){e.stopPropagation();}} style={{background:"#fff",borderRadius:14,padding:"22px 26px",width:"100%",maxWidth:330,boxShadow:"0 20px 60px rgba(30,58,95,0.2)"}}>
        <div style={{fontSize:"0.72rem",color:"#64748b",marginBottom:6}}>{fmtDate(game.date)} · {game.time} · {game.venue}</div>
        <div style={{fontSize:"1rem",fontWeight:700,marginBottom:16,color:"#1e3a5f"}}>{game.home} <span style={{color:"#3b82f6",margin:"0 6px"}}>vs</span> {game.away}</div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20,justifyContent:"center"}}>
          <input type="number" min="0" max="20" value={h} onChange={function(e){setH(e.target.value);}} style={inp} placeholder="-"/>
          <span style={{color:"#94a3b8",fontWeight:800,fontSize:"1.2rem"}}>:</span>
          <input type="number" min="0" max="20" value={a} onChange={function(e){setA(e.target.value);}} style={inp} placeholder="-"/>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{background:"#f1f5f9",border:"none",color:"#64748b",padding:"8px 14px",borderRadius:8,cursor:"pointer",fontSize:"0.85rem"}}>Abbrechen</button>
          <button onClick={function(){if(h!==""&&a!=="")onSave({home:parseInt(h),away:parseInt(a)});}} style={{background:"#2563eb",border:"none",color:"#fff",padding:"8px 14px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:"0.85rem"}}>Speichern</button>
        </div>
      </div>
    </div>
  );
}

function GameCard({game,myTip,results,onTip,currentUser}){
  const r=results[game.id];
  const allowed=canTip(game.date,game.time);
  const started=isStarted(game.date,game.time);
  const isDE=game.home==="Deutschland"||game.away==="Deutschland";
  const pts=myTip&&r?calcPoints(myTip,r):null;
  const pc=pts>=5?"#166534":pts>=3?"#854d0e":pts>=2?"#9a3412":"#64748b";
  const pb=pts>=5?"#dcfce7":pts>=3?"#fef9c3":pts>=2?"#fff7ed":"#f1f5f9";
  return(
    <div style={{background:"#fff",border:isDE?"1.5px solid #3b82f6":"1px solid #e2e8f0",borderRadius:10,padding:"10px 12px",boxShadow:"0 1px 3px rgba(30,58,95,0.06)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:4}}>
        <div style={{display:"flex",gap:4}}>
          <span style={{background:"#dbeafe",color:"#1d4ed8",fontSize:"0.6rem",padding:"1px 6px",borderRadius:99,fontWeight:700}}>Gr. {game.g}</span>
          {isDE && <span style={{background:"#2563eb",color:"#fff",fontSize:"0.6rem",padding:"1px 6px",borderRadius:99,fontWeight:700}}>DFB</span>}
        </div>
        <span style={{fontSize:"0.65rem",color:"#94a3b8"}}>{game.venue}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:4}}>
        <div style={{flex:1,display:"flex",alignItems:"center",gap:6,minWidth:0}}>
          <Flag team={game.home}/>
          <span style={{fontWeight:600,color:"#1e3a5f",fontSize:"0.82rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{game.home}</span>
        </div>
        <div style={{textAlign:"center",minWidth:76,flexShrink:0}}>
          {r ? <span style={{fontSize:"1.25rem",fontWeight:800,color:"#2563eb"}}>{r.home}:{r.away}</span>
             : <span style={{fontSize:"0.82rem",color:"#64748b",fontWeight:700}}>{game.time}</span>}
          <div style={{fontSize:"0.6rem",color:"#94a3b8",marginTop:1}}>{fmtDate(game.date)}</div>
        </div>
        <div style={{flex:1,display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end",minWidth:0}}>
          <span style={{fontWeight:600,color:"#1e3a5f",fontSize:"0.82rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textAlign:"right"}}>{game.away}</span>
          <Flag team={game.away}/>
        </div>
      </div>
      <div style={{borderTop:"1px solid #f1f5f9",marginTop:8,paddingTop:6,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:5}}>
        <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
          {myTip && <span style={{fontSize:"0.7rem",background:"#eff6ff",color:"#2563eb",padding:"2px 7px",borderRadius:99,border:"1px solid #bfdbfe"}}>Tipp: {myTip.home}:{myTip.away}</span>}
          {pts!==null && <span style={{fontSize:"0.7rem",fontWeight:700,background:pb,color:pc,padding:"2px 7px",borderRadius:99}}>{pts} Pkt</span>}
        </div>
        {currentUser && (allowed
          ? <button onClick={onTip} style={{background:"#2563eb",border:"none",color:"#fff",padding:"4px 12px",borderRadius:6,cursor:"pointer",fontSize:"0.7rem",fontWeight:700}}>{myTip?"Ändern":"Tipp"}</button>
          : started ? <span style={{fontSize:"0.65rem",color:"#94a3b8"}}>Beendet</span>
                    : <span style={{fontSize:"0.65rem",color:"#ef4444",fontWeight:600}}>Gesperrt</span>
        )}

    </div>
  );
}

function GroupTable({grp,results}){
  const rows=calcTable(grp,results);
  const th={fontSize:"0.62rem",color:"#64748b",fontWeight:600,padding:"4px 5px",textAlign:"center"};
  const td={fontSize:"0.72rem",padding:"5px",textAlign:"center",color:"#1e3a5f"};
  return(
    <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,overflow:"hidden"}}>
      <div style={{background:"#1e3a5f",padding:"7px 12px",color:"#fff",fontSize:"0.78rem",fontWeight:700}}>Gruppe {grp}</div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:280}}>
          <thead><tr style={{background:"#f8fafc"}}>
            <th style={Object.assign({},th,{textAlign:"left",paddingLeft:10})}>#</th>
            <th style={Object.assign({},th,{textAlign:"left"})}>Team</th>
            <th style={th}>Sp</th><th style={th}>S</th><th style={th}>U</th><th style={th}>N</th>
            <th style={th}>Tore</th><th style={th}>TD</th>
            <th style={Object.assign({},th,{fontWeight:700,color:"#1d4ed8"})}>Pkt</th>
          </tr></thead>
          <tbody>{rows.map(function(r,i){return(
            <tr key={r.n} style={{borderTop:"1px solid #f1f5f9",background:i<2?"#f0f9ff":"#fff"}}>
              <td style={Object.assign({},td,{paddingLeft:10,color:"#94a3b8",fontWeight:600})}>{i+1}</td>
              <td style={Object.assign({},td,{textAlign:"left",fontWeight:i<2?700:400,whiteSpace:"nowrap"})}>{r.n}</td>
              <td style={td}>{r.sp}</td><td style={td}>{r.g}</td><td style={td}>{r.u}</td><td style={td}>{r.v}</td>
              <td style={td}>{r.tf}:{r.ta}</td>
              <td style={Object.assign({},td,{color:r.td>0?"#16a34a":r.td<0?"#dc2626":"#64748b"})}>{r.td>0?"+":""}{r.td}</td>
              <td style={Object.assign({},td,{fontWeight:700,color:"#2563eb"})}>{r.pts}</td>
            </tr>
          );})}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Leaderboard({users,allTips,results}){
  const scored=users.map(function(u){
    var pts=0,exact=0,tend=0;
    GAMES.forEach(function(x){var p=calcPoints(allTips[u.id]&&allTips[u.id][x.id],results[x.id]);pts+=p;if(p===5)exact++;else if(p>=2)tend++;});
    return Object.assign({},u,{pts:pts,exact:exact,tend:tend});
  }).sort(function(a,b){return b.pts-a.pts||b.exact-a.exact;});
  if(!scored.length)return React.createElement("div",{style:{textAlign:"center",color:"#94a3b8",padding:"28px 0",fontSize:"0.85rem"}},"Noch keine Teilnehmer.");
  return(
    <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,overflow:"hidden"}}>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr style={{background:"#1e3a5f"}}>
          <th style={{fontSize:"0.62rem",color:"#93c5fd",fontWeight:600,padding:"6px 8px",textAlign:"left",paddingLeft:12}}>#</th>
          <th style={{fontSize:"0.62rem",color:"#93c5fd",fontWeight:600,padding:"6px 8px",textAlign:"left"}}>Name</th>
          <th style={{fontSize:"0.62rem",color:"#93c5fd",fontWeight:600,padding:"6px 8px",textAlign:"center"}}>Exakt</th>
          <th style={{fontSize:"0.62rem",color:"#93c5fd",fontWeight:600,padding:"6px 8px",textAlign:"center"}}>Tendenz</th>
          <th style={{fontSize:"0.62rem",color:"#fff",fontWeight:700,padding:"6px 8px",textAlign:"center"}}>Punkte</th>
        </tr></thead>
        <tbody>{scored.map(function(u,i){
          var medal=i===0?"1.":i===1?"2.":i===2?"3.":(i+1)+".";
          return(
            <tr key={u.id} style={{borderTop:"1px solid #f1f5f9",background:i===0?"#fefce8":i===1?"#f8fafc":i===2?"#fff7ed":"#fff"}}>
              <td style={{fontSize:"0.78rem",padding:"7px 8px",paddingLeft:12,fontWeight:700,color:i===0?"#d97706":i===1?"#64748b":i===2?"#b45309":"#94a3b8"}}>{medal}</td>
              <td style={{fontSize:"0.78rem",padding:"7px 8px",fontWeight:600,color:"#1e3a5f"}}>{u.name}</td>
              <td style={{fontSize:"0.78rem",padding:"7px 8px",textAlign:"center",color:"#16a34a",fontWeight:600}}>{u.exact}x</td>
              <td style={{fontSize:"0.78rem",padding:"7px 8px",textAlign:"center",color:"#1e3a5f"}}>{u.tend}x</td>
              <td style={{fontSize:"0.92rem",padding:"7px 8px",textAlign:"center",fontWeight:800,color:"#2563eb"}}>{u.pts}</td>
            </tr>
          );
        })}</tbody>
      </table>
    </div>
  );
}

function Register({onRegister}){
  const[name,setName]=useState("");
  const[email,setEmail]=useState("");
  const[err,setErr]=useState("");
  const inp={width:"100%",padding:"10px 12px",border:"1px solid #cbd5e1",borderRadius:8,fontSize:"0.88rem",color:"#1e3a5f",outline:"none"};
  function go(){
    if(!name.trim())return setErr("Bitte Namen eingeben.");
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))return setErr("Bitte gültige E-Mail eingeben.");
    onRegister(name.trim(),email.trim());
  }
  return(
    <div style={{background:"#fff",border:"1px solid #bfdbfe",borderRadius:14,padding:"22px",maxWidth:360,margin:"0 auto",boxShadow:"0 4px 20px rgba(30,58,95,0.1)"}}>
      <h3 style={{margin:"0 0 4px",color:"#1e3a5f",fontSize:"1.05rem"}}>Kicktipp beitreten</h3>
      <p style={{margin:"0 0 16px",fontSize:"0.78rem",color:"#64748b"}}>Name und E-Mail eintragen und mitspielen.</p>
      <div style={{marginBottom:10}}>
        <label style={{fontSize:"0.75rem",color:"#64748b",display:"block",marginBottom:3}}>Name</label>
        <input value={name} onChange={function(e){setName(e.target.value);setErr("");}} style={inp} placeholder="Max Mustermann"/>
      </div>
      <div style={{marginBottom:14}}>
        <label style={{fontSize:"0.75rem",color:"#64748b",display:"block",marginBottom:3}}>E-Mail</label>
        <input value={email} onChange={function(e){setEmail(e.target.value);setErr("");}} style={inp} placeholder="max@beispiel.de" type="email"/>
      </div>
      {err && <div style={{color:"#ef4444",fontSize:"0.75rem",marginBottom:8}}>{err}</div>}
      <button onClick={go} style={{background:"#2563eb",border:"none",color:"#fff",padding:"10px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:"0.88rem",width:"100%"}}>Registrieren</button>
      <p style={{margin:"8px 0 0",fontSize:"0.68rem",color:"#94a3b8",textAlign:"center"}}>Daten werden lokal im Browser gespeichert.</p>
    </div>
  );
}

function AdminPanel({results,onSave,onDelete,onClose}){
  const[auth,setAuth]=useState(false);
  const[pin,setPin]=useState("");
  const[editId,setEditId]=useState(null);
  const[h,setH]=useState("");
  const[a,setA]=useState("");
  function startEdit(x){var r=results[x.id];setEditId(x.id);setH(r?String(r.home):"");setA(r?String(r.away):"");}
  function cancel(){setEditId(null);setH("");setA("");}
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(15,39,68,0.6)",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:1000,padding:"20px 12px",overflowY:"auto"}}>
      <div onClick={function(e){e.stopPropagation();}} style={{background:"#fff",borderRadius:14,padding:"22px",width:"100%",maxWidth:500,boxShadow:"0 20px 60px rgba(30,58,95,0.25)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h3 style={{margin:0,color:"#1e3a5f",fontSize:"1rem"}}>Ergebnisse verwalten</h3>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:"1.2rem",cursor:"pointer",color:"#64748b"}}>X</button>
        </div>
        {!auth ? (
          <div>
            <p style={{fontSize:"0.8rem",color:"#64748b",marginBottom:12}}>Admin-PIN eingeben (Standard: 1234):</p>
            <input type="password" value={pin} onChange={function(e){setPin(e.target.value);}}
              onKeyDown={function(e){if(e.key==="Enter"&&pin==="1234")setAuth(true);}}
              style={{width:"100%",padding:"10px",border:"1px solid #cbd5e1",borderRadius:8,fontSize:"1rem",outline:"none",marginBottom:10}} placeholder="PIN"/>
            <button onClick={function(){if(pin==="1234")setAuth(true);else setPin("");}}
              style={{background:"#2563eb",border:"none",color:"#fff",padding:"9px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:"0.88rem",width:"100%"}}>
              Anmelden
            </button>
          </div>
        ) : (
          <div style={{maxHeight:"65vh",overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
            {GAMES.map(function(x){
              var r=results[x.id];
              var editing=editId===x.id;
              return(
                <div key={x.id} style={{background:r?"#f0f9ff":"#f8fafc",border:r?"1px solid #bfdbfe":"1px solid #e2e8f0",borderRadius:8,padding:"8px 10px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                    <div style={{fontSize:"0.76rem",fontWeight:600,color:"#1e3a5f",flex:1,minWidth:0}}>
                      <span style={{fontSize:"0.6rem",background:"#dbeafe",color:"#1d4ed8",padding:"1px 5px",borderRadius:99,marginRight:5}}>Gr.{x.g}</span>
                      {x.home} vs {x.away}
                      <span style={{fontSize:"0.6rem",color:"#94a3b8",marginLeft:5}}>{fmtDate(x.date)} {x.time}</span>
                    </div>
                    <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}>
                      {r&&!editing&&<span style={{fontWeight:800,color:"#2563eb",fontSize:"0.9rem"}}>{r.home}:{r.away}</span>}
                      {!editing&&<button onClick={function(){startEdit(x);}} style={{background:"#2563eb",border:"none",color:"#fff",padding:"3px 10px",borderRadius:6,cursor:"pointer",fontSize:"0.7rem",fontWeight:700}}>{r?"Ändern":"Eintragen"}</button>}
                      {r&&!editing&&<button onClick={function(){onDelete(x.id);}} style={{background:"#fee2e2",border:"none",color:"#dc2626",padding:"3px 8px",borderRadius:6,cursor:"pointer",fontSize:"0.7rem",fontWeight:700}}>X</button>}
                    </div>
                  </div>
                  {editing&&(
                    <div style={{display:"flex",gap:8,alignItems:"center",marginTop:8,flexWrap:"wrap"}}>
                      <span style={{fontSize:"0.75rem",color:"#64748b"}}>{x.home}</span>
                      <input type="number" min="0" max="20" value={h} onChange={function(e){setH(e.target.value);}}
                        style={{width:46,textAlign:"center",border:"2px solid #3b82f6",borderRadius:6,fontSize:"1.1rem",fontWeight:700,padding:"3px",outline:"none"}}/>
                      <span style={{color:"#94a3b8",fontWeight:700}}>:</span>
                      <input type="number" min="0" max="20" value={a} onChange={function(e){setA(e.target.value);}}
                        style={{width:46,textAlign:"center",border:"2px solid #3b82f6",borderRadius:6,fontSize:"1.1rem",fontWeight:700,padding:"3px",outline:"none"}}/>
                      <span style={{fontSize:"0.75rem",color:"#64748b"}}>{x.away}</span>
                      <button onClick={function(){if(h!==""&&a!==""){onSave(x.id,h,a);cancel();}}}
                        style={{background:"#16a34a",border:"none",color:"#fff",padding:"4px 12px",borderRadius:6,cursor:"pointer",fontWeight:700,fontSize:"0.75rem"}}>OK</button>
                      <button onClick={cancel}
                        style={{background:"#f1f5f9",border:"none",color:"#64748b",padding:"4px 10px",borderRadius:6,cursor:"pointer",fontSize:"0.75rem"}}>Abbrechen</button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  const[tab,setTab]=useState("Spielplan");
  const[grpFilter,setGrpFilter]=useState("Alle");
  const[results,setResults]=useState(function(){return ls.get("wm26_res")||{};});
  const[allTips,setAllTips]=useState(function(){return ls.get("wm26_tips")||{};});
  const[users,setUsers]=useState(function(){return ls.get("wm26_users")||[];});
  const[me,setMe]=useState(function(){return ls.get("wm26_me")||null;});
  const[modal,setModal]=useState(null);
  const[adminOpen,setAdminOpen]=useState(false);

  function saveResults(r){setResults(r);ls.set("wm26_res",r);}
  function handleSaveResult(gameId,h,a){saveResults(Object.assign({},results,{[gameId]:{home:parseInt(h),away:parseInt(a)}}));}
  function handleDeleteResult(gameId){var nr=Object.assign({},results);delete nr[gameId];saveResults(nr);}
  function register(name,email){
    var id=name.replace(/\s+/g,"_")+"_"+Date.now();
    var u={id:id,name:name,email:email};
    var nu=users.filter(function(x){return x.email!==email;}).concat([u]);
    setUsers(nu);setMe(u);ls.set("wm26_users",nu);ls.set("wm26_me",u);
  }
  function saveTip(game,tip){
    var uid=me.id;
    var ut=Object.assign({},allTips[uid]||{},{[game.id]:tip});
    var nt=Object.assign({},allTips,{[uid]:ut});
    setAllTips(nt);ls.set("wm26_tips",nt);setModal(null);
  }
  function logout(){setMe(null);ls.set("wm26_me",null);}

  var myTips=me?(allTips[me.id]||{}):{};
  var displayGames=grpFilter==="Alle"?GAMES:GAMES.filter(function(x){return x.g===grpFilter;});

  function tabStyle(t){return{background:"none",border:"none",borderBottom:tab===t?"3px solid #2563eb":"3px solid transparent",color:tab===t?"#2563eb":"#64748b",padding:"11px 0",flex:1,cursor:"pointer",fontWeight:tab===t?700:400,fontSize:"0.82rem"};}

  return(
    <div style={{minHeight:"100vh",background:"#f1f5f9",color:"#1e3a5f"}}>
      <div style={{background:"linear-gradient(135deg,#1e3a5f,#2563eb)",padding:"14px 14px 10px",boxShadow:"0 2px 10px rgba(30,58,95,0.2)"}}>
        <div style={{maxWidth:680,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
          <div>
            <h1 style={{margin:0,fontSize:"1.3rem",fontWeight:800,color:"#fff"}}>WM 2026</h1>
            <p style={{margin:"2px 0 0",fontSize:"0.68rem",color:"#bfdbfe"}}>11. Juni - 19. Juli · Alle Zeiten MESZ</p>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            {me&&<div style={{fontSize:"0.7rem",color:"#fff",background:"rgba(255,255,255,0.15)",borderRadius:7,padding:"3px 8px",marginBottom:4}}>{me.name}</div>}
            <div style={{display:"flex",gap:5,justifyContent:"flex-end"}}>
              <button onClick={function(){setAdminOpen(true);}} style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#bfdbfe",padding:"4px 10px",borderRadius:6,cursor:"pointer",fontSize:"0.7rem"}}>Admin</button>
              {me&&<button onClick={logout} style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#bfdbfe",padding:"4px 10px",borderRadius:6,cursor:"pointer",fontSize:"0.7rem"}}>Abmelden</button>}
            </div>
          </div>
        </div>
      </div>

      <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:680,margin:"0 auto",display:"flex"}}>
          {["Spielplan","Gruppen","Kicktipp"].map(function(t){return <button key={t} style={tabStyle(t)} onClick={function(){setTab(t);}}>{t}</button>;})}
        </div>
      </div>

      <div style={{maxWidth:680,margin:"0 auto",padding:"12px 10px 40px"}}>
        {tab==="Spielplan"&&(
          <div>
            <div style={{overflowX:"auto",marginBottom:10,paddingBottom:2}}>
              <div style={{display:"flex",gap:4,minWidth:"max-content"}}>
                {["Alle"].concat(GROUPS).map(function(g){return(
                  <button key={g} onClick={function(){setGrpFilter(g);}} style={{background:grpFilter===g?"#2563eb":"#fff",border:"1px solid",borderColor:grpFilter===g?"#2563eb":"#e2e8f0",color:grpFilter===g?"#fff":"#64748b",padding:"4px 10px",borderRadius:99,cursor:"pointer",fontSize:"0.7rem",fontWeight:grpFilter===g?700:400,whiteSpace:"nowrap"}}>
                    {g==="Alle"?"Alle":"Gr. "+g}
                  </button>
                );})}
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {displayGames.map(function(game){return(
                <GameCard key={game.id} game={game} myTip={myTips[game.id]} results={results} onTip={function(){setModal(game);}} currentUser={me}/>
              );})}
            </div>
          </div>
        )}

        {tab==="Gruppen"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {GROUPS.map(function(g){return <GroupTable key={g} grp={g} results={results}/>;} )}
          </div>
        )}

        {tab==="Kicktipp"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {!me&&<Register onRegister={register}/>}
            {me&&<div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:10,padding:"10px 14px",fontSize:"0.8rem",color:"#1d4ed8"}}>Du nimmst als <strong>{me.name}</strong> teil. Tipps im Spielplan-Tab abgeben!</div>}
            <div>
              <h3 style={{margin:"0 0 8px",fontSize:"0.92rem",fontWeight:700}}>Gesamtwertung</h3>
              <div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:8,padding:"7px 12px",fontSize:"0.72rem",color:"#92400e",marginBottom:8}}>
                <strong>Punkte:</strong> Exaktes Ergebnis = 5 · Gleiche Tordifferenz = 3 · Richtige Tendenz = 2
              </div>
              <Leaderboard users={users} allTips={allTips} results={results}/>
            </div>
            {me&&(
              <div>
                <h3 style={{margin:"0 0 8px",fontSize:"0.92rem",fontWeight:700}}>Deine Tipps</h3>
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  {GAMES.filter(function(x){return myTips[x.id]||results[x.id];}).map(function(x){
                    var r=results[x.id],t=myTips[x.id],pts=calcPoints(t,r);
                    var pc=pts>=5?"#166534":pts>=3?"#854d0e":pts>=2?"#9a3412":"#64748b";
                    var pb=pts>=5?"#dcfce7":pts>=3?"#fef9c3":pts>=2?"#fff7ed":"#f1f5f9";
                    return(
                      <div key={x.id} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                        <div style={{fontSize:"0.76rem",fontWeight:600}}>{x.home} vs {x.away}</div>
                        <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
                          {r&&<span style={{fontSize:"0.72rem",color:"#64748b"}}>Ergebnis: <strong>{r.home}:{r.away}</strong></span>}
                          {t&&<span style={{fontSize:"0.72rem",color:"#2563eb"}}>Tipp: <strong>{t.home}:{t.away}</strong></span>}
                          {t&&r&&<span style={{fontSize:"0.72rem",fontWeight:700,background:pb,color:pc,padding:"1px 7px",borderRadius:99}}>{pts} Pkt</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {modal&&me&&<TipModal game={modal} onClose={function(){setModal(null);}} onSave={function(t){saveTip(modal,t);}} existing={myTips[modal.id]}/>}
      {adminOpen&&<AdminPanel results={results} onSave={handleSaveResult} onDelete={handleDeleteResult} onClose={function(){setAdminOpen(false);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>

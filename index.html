// ── HELPERS ───────────────────────────────────────────────────────────────
const dt=(d,t)=>new Date(`${d}T${t}:00`);
const canTip=(d,t)=>new Date()<new Date(dt(d,t).getTime()-5*60*1000);
const isStarted=(d,t)=>new Date()>=dt(d,t);
const isFinished=(d,t)=>new Date()>=new Date(dt(d,t).getTime()+110*60*1000);
const fmtDate=d=>new Date(d).toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"2-digit"});

function calcPoints(tip,res){
  if(!tip||!res)return 0;
  const{home:tH,away:tA}=tip,{home:rH,away:rA}=res;
  if(tH===rH&&tA===rA)return 5;
  const tD=tH-tA,rD=rH-rA;
  const ok=(tD>0&&rD>0)||(tD<0&&rD<0)||(tD===0&&rD===0);
  if(!ok)return 0;
  if(tD===rD)return 3;
  return 2;
}

function calcTable(group,results){
  const s=Object.fromEntries(GROUP_TEAMS[group].map(t=>[t,{sp:0,g:0,u:0,v:0,tf:0,ta:0,pts:0}]));
  GAMES.filter(g=>g.group===group).forEach(g=>{
    const r=results[g.id];if(!r)return;
    s[g.home].sp++;s[g.away].sp++;
    s[g.home].tf+=r.home;s[g.home].ta+=r.away;
    s[g.away].tf+=r.away;s[g.away].ta+=r.home;
    if(r.home>r.away){s[g.home].g++;s[g.home].pts+=3;s[g.away].v++;}
    else if(r.home<r.away){s[g.away].g++;s[g.away].pts+=3;s[g.home].v++;}
    else{s[g.home].u++;s[g.away].u++;s[g.home].pts++;s[g.away].pts++;}
  });
  return Object.entries(s).map(([n,v])=>({n,...v,td:v.tf-v.ta}))
    .sort((a,b)=>b.pts-a.pts||b.td-a.td||b.tf-a.tf);
}

function Modal({game,onClose,onSave,existing}){
  const[h,setH]=useState(existing!=null?String(existing.home):"");
  const[a,setA]=useState(existing!=null?String(existing.away):"");
  const inp={width:54,textAlign:"center",background:"#fff",border:"2px solid #3b82f6",borderRadius:8,color:"#1e3a5f",fontSize:"1.4rem",fontWeight:700,padding:"6px",outline:"none"};
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(15,39,68,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:14,padding:"22px 26px",width:"100%",maxWidth:330,boxShadow:"0 20px 60px rgba(30,58,95,0.2)"}}>
        <div style={{fontSize:"0.72rem",color:"#64748b",marginBottom:6}}>{fmtDate(game.date)} · {game.time} · {game.venue}</div>
        <div style={{fontSize:"1rem",fontWeight:700,marginBottom:16,color:"#1e3a5f"}}>{FLAGS[game.home]||"🏳️"} {game.home} <span style={{color:"#3b82f6",margin:"0 5px"}}>vs</span> {game.away} {FLAGS[game.away]||"🏳️"}</div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20,justifyContent:"center"}}>
          <input type="number" min="0" max="20" value={h} onChange={e=>setH(e.target.value)} style={inp} placeholder="–"/>
          <span style={{color:"#94a3b8",fontWeight:800,fontSize:"1.2rem"}}>:</span>
          <input type="number" min="0" max="20" value={a} onChange={e=>setA(e.target.value)} style={inp} placeholder="–"/>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{background:"#f1f5f9",border:"none",color:"#64748b",padding:"8px 14px",borderRadius:8,cursor:"pointer",fontSize:"0.85rem"}}>Abbrechen</button>
          <button onClick={()=>{if(h!==""&&a!=="")onSave({home:parseInt(h),away:parseInt(a)});}} style={{background:"#2563eb",border:"none",color:"#fff",padding:"8px 14px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:"0.85rem"}}>Speichern</button>
        </div>
      </div>
    </div>
  );
}

function GameCard({game,myTip,results,onTip,currentUser}){
  const r=results[game.id];
  const allowed=canTip(game.date,game.time);
  const started=isStarted(game.date,game.time);
  const isDE=game.home==="Deutschland"||game.away==="Deutschland";
  const pts=myTip&&r?calcPoints(myTip,r):null;
  const ptsColor=pts>=5?"#166534":pts>=3?"#854d0e":pts>=2?"#9a3412":"#64748b";
  const ptsBg=pts>=5?"#dcfce7":pts>=3?"#fef9c3":pts>=2?"#fff7ed":"#f1f5f9";
  return(
    <div style={{background:"#fff",border:isDE?"1.5px solid #3b82f6":"1px solid #e2e8f0",borderRadius:10,padding:"10px 12px",boxShadow:"0 1px 3px rgba(30,58,95,0.06)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:4}}>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          <span style={{background:"#dbeafe",color:"#1d4ed8",fontSize:"0.6rem",padding:"1px 6px",borderRadius:99,fontWeight:700}}>Gr. {game.group}</span>
          {isDE&&<span style={{background:"#2563eb",color:"#fff",fontSize:"0.6rem",padding:"1px 6px",borderRadius:99,fontWeight:700}}>🇩🇪 DFB</span>}
        </div>
        <span style={{fontSize:"0.65rem",color:"#94a3b8"}}>{game.venue}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:4}}>
        <div style={{flex:1,display:"flex",alignItems:"center",gap:6,minWidth:0}}>
          <span style={{fontSize:"1.15rem",flexShrink:0}}>{FLAGS[game.home]||"🏳️"}</span>
          <span style={{fontWeight:600,color:"#1e3a5f",fontSize:"0.82rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{game.home}</span>
        </div>
        <div style={{textAlign:"center",minWidth:76,flexShrink:0}}>
          {r?<span style={{fontSize:"1.25rem",fontWeight:800,color:"#2563eb"}}>{r.home}:{r.away}</span>
            :<span style={{fontSize:"0.82rem",color:"#64748b",fontWeight:700}}>{game.time}</span>}
          <div style={{fontSize:"0.6rem",color:"#94a3b8",marginTop:1}}>{fmtDate(game.date)}</div>
        </div>
        <div style={{flex:1,display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end",minWidth:0}}>
          <span style={{fontWeight:600,color:"#1e3a5f",fontSize:"0.82rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textAlign:"right"}}>{game.away}</span>
          <span style={{fontSize:"1.15rem",flexShrink:0}}>{FLAGS[game.away]||"🏳️"}</span>
        </div>
      </div>
      <div style={{borderTop:"1px solid #f1f5f9",marginTop:8,paddingTop:6,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:5}}>
        <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
          {myTip&&<span style={{fontSize:"0.7rem",background:"#eff6ff",color:"#2563eb",padding:"2px 7px",borderRadius:99,border:"1px solid #bfdbfe"}}>Tipp: {myTip.home}:{myTip.away}</span>}
          {pts!==null&&<span style={{fontSize:"0.7rem",fontWeight:700,background:ptsBg,color:ptsColor,padding:"2px 7px",borderRadius:99}}>{pts} Pkt</span>}

        {currentUser&&(
          allowed?<button onClick={onTip} style={{background:"#2563eb",border:"none",color:"#fff",padding:"4px 12px",borderRadius:6,cursor:"pointer",fontSize:"0.7rem",fontWeight:700}}>{myTip?"Ändern":"Tipp"}</button>

        )}

    </div>

}

function GroupTable({group,results}){
  const t=calcTable(group,results);
  const th={fontSize:"0.62rem",color:"#64748b",fontWeight:600,padding:"4px 5px",textAlign:"center"};
  const td={fontSize:"0.72rem",padding:"5px 5px",textAlign:"center",color:"#1e3a5f"};
  return(
    <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,overflow:"hidden",boxShadow:"0 1px 3px rgba(30,58,95,0.05)"}}>
      <div style={{background:"#1e3a5f",padding:"7px 12px",color:"#fff",fontSize:"0.78rem",fontWeight:700}}>Gruppe {group}</div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:300}}>
          <thead><tr style={{background:"#f8fafc"}}>
            <th style={{...th,textAlign:"left",paddingLeft:10}}>#</th>
            <th style={{...th,textAlign:"left"}}>Team</th>
            <th style={th}>Sp</th><th style={th}>S</th><th style={th}>U</th><th style={th}>N</th>
            <th style={th}>Tore</th><th style={th}>TD</th>
            <th style={{...th,fontWeight:700,color:"#1d4ed8"}}>Pkt</th>
          </tr></thead>
          <tbody>{t.map((r,i)=>(
            <tr key={r.n} style={{borderTop:"1px solid #f1f5f9",background:i<2?"#f0f9ff":"#fff"}}>
              <td style={{...td,paddingLeft:10,color:"#94a3b8",fontWeight:600}}>{i+1}</td>
              <td style={{...td,textAlign:"left",fontWeight:i<2?700:400,whiteSpace:"nowrap"}}>
                <span style={{marginRight:4}}>{FLAGS[r.n]||"🏳️"}</span>{r.n}
              </td>
              <td style={td}>{r.sp}</td><td style={td}>{r.g}</td><td style={td}>{r.u}</td><td style={td}>{r.v}</td>
              <td style={td}>{r.tf}:{r.ta}</td>
              <td style={{...td,color:r.td>0?"#16a34a":r.td<0?"#dc2626":"#64748b"}}>{r.td>0?"+":""}{r.td}</td>
              <td style={{...td,fontWeight:700,color:"#2563eb"}}>{r.pts}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    </div>
  );
}

function Leaderboard({users,allTips,results}){
  const scored=users.map(u=>{
    let pts=0,exact=0,tend=0;
    GAMES.forEach(g=>{
      const t=allTips[u.id]?.[g.id],r=results[g.id],p=calcPoints(t,r);
      pts+=p;if(p===5)exact++;else if(p>=2)tend++;
    });
    return{...u,pts,exact,tend};
  }).sort((a,b)=>b.pts-a.pts||b.exact-a.exact);
  if(!scored.length)return<div style={{textAlign:"center",color:"#94a3b8",padding:"28px 0",fontSize:"0.85rem"}}>Noch keine Teilnehmer.</div>;
  const th={fontSize:"0.62rem",color:"#93c5fd",fontWeight:600,padding:"6px 8px",textAlign:"center"};
  const td={fontSize:"0.78rem",padding:"7px 8px",textAlign:"center",color:"#1e3a5f"};
  const medal=i=>i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1;
  return(
    <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,overflow:"hidden"}}>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr style={{background:"#1e3a5f"}}>
          <th style={{...th,textAlign:"left",paddingLeft:12}}>#</th>
          <th style={{...th,textAlign:"left"}}>Name</th>
          <th style={th}>Exakt</th><th style={th}>Tendenz</th>
          <th style={{...th,color:"#fff",fontWeight:700}}>Punkte</th>
        </tr></thead>
        <tbody>{scored.map((u,i)=>(
          <tr key={u.id} style={{borderTop:"1px solid #f1f5f9",background:i===0?"#fefce8":i===1?"#f8fafc":i===2?"#fff7ed":"#fff"}}>
            <td style={{...td,paddingLeft:12,fontWeight:700,color:i===0?"#d97706":i===1?"#64748b":i===2?"#b45309":"#94a3b8"}}>{medal(i)}</td>
            <td style={{...td,textAlign:"left",fontWeight:600}}>{u.name}</td>
            <td style={{...td,color:"#16a34a",fontWeight:600}}>{u.exact}x</td>
            <td style={td}>{u.tend}x</td>
            <td style={{...td,fontWeight:800,fontSize:"0.92rem",color:"#2563eb"}}>{u.pts}</td>
          </tr>
        ))}</tbody>
      </table>
    </div>
  );
}

function Register({onRegister}){
  const[name,setName]=useState("");
  const[email,setEmail]=useState("");
  const[err,setErr]=useState("");
  const inp={width:"100%",padding:"10px 12px",border:"1px solid #cbd5e1",borderRadius:8,fontSize:"0.88rem",color:"#1e3a5f",outline:"none"};
  const go=()=>{
    if(!name.trim())return setErr("Bitte Namen eingeben.");
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))return setErr("Bitte gültige E-Mail eingeben.");
    onRegister(name.trim(),email.trim());
  };
  return(
    <div style={{background:"#fff",border:"1px solid #bfdbfe",borderRadius:14,padding:"22px",maxWidth:360,margin:"0 auto",boxShadow:"0 4px 20px rgba(30,58,95,0.1)"}}>
      <h3 style={{margin:"0 0 4px",color:"#1e3a5f",fontSize:"1.05rem"}}>🏆 Kicktipp beitreten</h3>
      <p style={{margin:"0 0 16px",fontSize:"0.78rem",color:"#64748b"}}>Name & E-Mail eintragen und automatisch mitspielen.</p>
      <div style={{marginBottom:10}}>
        <label style={{fontSize:"0.75rem",color:"#64748b",display:"block",marginBottom:3}}>Name</label>
        <input value={name} onChange={e=>{setName(e.target.value);setErr("");}} style={inp} placeholder="Max Mustermann"/>
      </div>
      <div style={{marginBottom:14}}>
        <label style={{fontSize:"0.75rem",color:"#64748b",display:"block",marginBottom:3}}>E-Mail</label>
        <input value={email} onChange={e=>{setEmail(e.target.value);setErr("");}} style={inp} placeholder="max@beispiel.de" type="email"/>
      </div>
      {err&&<div style={{color:"#ef4444",fontSize:"0.75rem",marginBottom:8}}>{err}</div>}
      <button onClick={go} style={{background:"#2563eb",border:"none",color:"#fff",padding:"10px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:"0.88rem",width:"100%"}}>Registrieren & mitspielen</button>
      <p style={{margin:"8px 0 0",fontSize:"0.68rem",color:"#94a3b8",textAlign:"center"}}>Daten werden lokal im Browser gespeichert.</p>
    </div>
  );
}

// ── MAIN ─────────────────────────────────────────────────────────────────────
function App(){
  const[tab,setTab]=useState("Spielplan");
  const[grp,setGrp]=useState("Alle");
  const[results,setResults]=useState(()=>ls.get("wm26_res")||{});
  const[allTips,setAllTips]=useState(()=>ls.get("wm26_tips")||{});
  const[users,setUsers]=useState(()=>ls.get("wm26_users")||[]);
  const[me,setMe]=useState(()=>ls.get("wm26_me")||null);
  const[modal,setModal]=useState(null);
  const[loading,setLoading]=useState(false);
  const[lastFetch,setLastFetch]=useState(null);

  const saveResults=r=>{setResults(r);ls.set("wm26_res",r);};

  const fetchResults=async(silent=false)=>{
    if(!silent)setLoading(true);
    try{
      const started=GAMES.filter(g=>isStarted(g.date,g.time));
      if(!started.length){setLoading(false);return;}
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:1500,
          system:`Antworte NUR mit JSON, kein Markdown. Format: {"results":[{"id":<n>,"home":<n>,"away":<n>}]}. Nur abgeschlossene Spiele. Heute: ${new Date().toLocaleDateString("de-DE")}.`,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          messages:[{role:"user",content:`WM 2026 Ergebnisse suchen. JSON zurückgeben:\n${started.map(g=>`ID ${g.id}: ${g.home} vs ${g.away} (${g.date} ${g.time})`).join("\n")}`}]
        })
      });
      const data=await res.json();
      const text=data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
      const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
      if(parsed.results){
        const nr={...results};
        parsed.results.forEach(r=>{nr[r.id]={home:r.home,away:r.away};});
        saveResults(nr);setLastFetch(new Date());
      }
    }catch(e){console.error(e);}
    setLoading(false);
  };

  useEffect(()=>{
    const iv=setInterval(()=>{
      if(GAMES.some(g=>isStarted(g.date,g.time)&&!isFinished(g.date,g.time)))fetchResults(true);
    },5*60*1000);
    return()=>clearInterval(iv);
  },[results]);

  const register=(name,email)=>{
    const id=`${name.replace(/\s+/g,"_")}_${Date.now()}`;
    const u={id,name,email};
    const nu=[...users.filter(x=>x.email!==email),u];
    setUsers(nu);setMe(u);
    ls.set("wm26_users",nu);ls.set("wm26_me",u);
  };

  const saveTip=(game,tip)=>{
    const uid=me.id;
    const nt={...allTips,[uid]:{...(allTips[uid]||{}),[game.id]:tip}};
    setAllTips(nt);ls.set("wm26_tips",nt);setModal(null);
  };

  const logout=()=>{setMe(null);ls.set("wm26_me",null);};

  const myTips=me?(allTips[me.id]||{}):{};
  const displayGames=grp==="Alle"?GAMES:GAMES.filter(g=>g.group===grp);

  const tabS=t=>({background:"none",border:"none",borderBottom:tab===t?"3px solid #2563eb":"3px solid transparent",color:tab===t?"#2563eb":"#64748b",padding:"11px 0",flex:1,cursor:"pointer",fontWeight:tab===t?700:400,fontSize:"0.82rem"});

  return(
    <div style={{minHeight:"100vh",background:"#f1f5f9",color:"#1e3a5f"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1e3a5f,#2563eb)",padding:"14px 14px 10px",boxShadow:"0 2px 10px rgba(30,58,95,0.2)"}}>
        <div style={{maxWidth:680,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
          <div>
            <h1 style={{margin:0,fontSize:"1.3rem",fontWeight:800,color:"#fff"}}>⚽ WM 2026</h1>
            <p style={{margin:"2px 0 0",fontSize:"0.68rem",color:"#bfdbfe"}}>11. Juni – 19. Juli · Alle Zeiten MESZ</p>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            {me&&<div style={{fontSize:"0.7rem",color:"#fff",background:"rgba(255,255,255,0.15)",borderRadius:7,padding:"3px 8px",marginBottom:4}}>👤 {me.name}</div>}
            <div style={{display:"flex",gap:5,justifyContent:"flex-end"}}>
              <button onClick={()=>fetchResults()} disabled={loading} style={{background:"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.3)",color:"#fff",padding:"4px 10px",borderRadius:6,cursor:loading?"not-allowed":"pointer",fontSize:"0.7rem",fontWeight:700}}>
                {loading?"…":"🔄"}
              </button>
              {me&&<button onClick={logout} style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#bfdbfe",padding:"4px 10px",borderRadius:6,cursor:"pointer",fontSize:"0.7rem"}}>Abmelden</button>}
            </div>
            {lastFetch&&<div style={{fontSize:"0.6rem",color:"#bfdbfe",marginTop:2}}>Stand: {lastFetch.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})}</div>}
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
        <div style={{maxWidth:680,margin:"0 auto",display:"flex"}}>
          {["Spielplan","Gruppen","Kicktipp"].map(t=><button key={t} style={tabS(t)} onClick={()=>setTab(t)}>{t}</button>)}
        </div>
      </div>

      <div style={{maxWidth:680,margin:"0 auto",padding:"12px 10px 40px"}}>

        {tab==="Spielplan"&&(
          <>
            <div style={{overflowX:"auto",marginBottom:10,paddingBottom:2}}>
              <div style={{display:"flex",gap:4,minWidth:"max-content"}}>
                {["Alle",...GROUPS].map(g=>(
                  <button key={g} onClick={()=>setGrp(g)} style={{background:grp===g?"#2563eb":"#fff",border:"1px solid",borderColor:grp===g?"#2563eb":"#e2e8f0",color:grp===g?"#fff":"#64748b",padding:"4px 10px",borderRadius:99,cursor:"pointer",fontSize:"0.7rem",fontWeight:grp===g?700:400,whiteSpace:"nowrap"}}>
                    {g==="Alle"?"Alle":`Gr. ${g}`}
                  </button>
                ))}
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {displayGames.map(g=>(
                <GameCard key={g.id} game={g} myTip={myTips[g.id]} results={results} onTip={()=>setModal(g)} currentUser={me}/>
              ))}
            </div>
          </>
        )}

        {tab==="Gruppen"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {GROUPS.map(g=><GroupTable key={g} group={g} results={results}/>)}
          </div>
        )}

        {tab==="Kicktipp"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {!me&&<Register onRegister={register}/>}
            {me&&(
              <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:10,padding:"10px 14px",fontSize:"0.8rem",color:"#1d4ed8"}}>
                ✅ Du nimmst als <strong>{me.name}</strong> teil. Gib im Spielplan deine Tipps ab!
              </div>
            )}
            <div>
              <h3 style={{margin:"0 0 8px",fontSize:"0.92rem",fontWeight:700}}>🏆 Gesamtwertung</h3>
              <div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:8,padding:"7px 12px",fontSize:"0.72rem",color:"#92400e",marginBottom:8}}>
                <strong>Punkte:</strong> Exaktes Ergebnis = 5 · Gleiche Tordifferenz = 3 · Richtige Tendenz = 2
              </div>
              <Leaderboard users={users} allTips={allTips} results={results}/>
            </div>
            {me&&(
              <div>
                <h3 style={{margin:"0 0 8px",fontSize:"0.92rem",fontWeight:700}}>Deine Tipps</h3>
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  {GAMES.filter(g=>myTips[g.id]||results[g.id]).map(g=>{
                    const r=results[g.id],t=myTips[g.id],pts=calcPoints(t,r);
                    const ptsColor=pts>=5?"#166534":pts>=3?"#854d0e":pts>=2?"#9a3412":"#64748b";
                    const ptsBg=pts>=5?"#dcfce7":pts>=3?"#fef9c3":pts>=2?"#fff7ed":"#f1f5f9";
                    return(
                      <div key={g.id} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                        <div style={{fontSize:"0.76rem",fontWeight:600,minWidth:0}}>
                          {FLAGS[g.home]||"🏳️"} {g.home} vs {g.away} {FLAGS[g.away]||"🏳️"}
                        </div>
                        <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
                          {r&&<span style={{fontSize:"0.72rem",color:"#64748b"}}>Ergebnis: <strong>{r.home}:{r.away}</strong></span>}
                          {t&&<span style={{fontSize:"0.72rem",color:"#2563eb"}}>Tipp: <strong>{t.home}:{t.away}</strong></span>}
                          {t&&r&&<span style={{fontSize:"0.72rem",fontWeight:700,background:ptsBg,color:ptsColor,padding:"1px 7px",borderRadius:99}}>{pts} Pkt</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {modal&&me&&<Modal game={modal} onClose={()=>setModal(null)} onSave={t=>saveTip(modal,t)} existing={myTips[modal.id]}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
